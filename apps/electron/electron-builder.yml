appId: com.cushion.app
productName: Cushion
directories:
  buildResources: build
  output: release
files:
  - out/**/*
asarUnpack:
  - "**/node_modules/ffmpeg-static/**/*"
  - "**/node_modules/opencode-*/**/*"
extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: build/icon.png
    to: icon.png
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true
mac:
  target: dmg
  category: public.app-category.productivity
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Folder
        CFBundleTypeRole: Viewer
        LSHandlerRank: Alternate
linux:
  target: AppImage
  category: Office
  mimeTypes:
    - inode/directory
