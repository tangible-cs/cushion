appId: com.cushion.app
productName: Cushion
directories:
  buildResources: build
  output: release
files:
  - out/**/*
asarUnpack:
  - "**/node_modules/ffmpeg-static/**/*"
extraResources:
  - from: ../coordinator/dist
    to: coordinator/dist
win:
  target: portable
mac:
  target: dmg
  category: public.app-category.productivity
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Folder
        CFBundleTypeRole: Viewer
        LSHandlerRank: Alternate
linux:
  target: AppImage
  category: Office
  mimeTypes:
    - inode/directory
